[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# Alte URLs aus Search Console
[[redirects]]
  from = "/entebbe"
  to = "/regionen/entebbe"
  status = 301

[[redirects]]
  from = "/kampala"
  to = "/regionen/kampala"
  status = 301

[[redirects]]
  from = "/jinja"
  to = "/regionen/jinja"
  status = 301

[[redirects]]
  from = "/murchison-nationalpark"
  to = "/nationalparks/murchison_falls"
  status = 301


[[redirects]]
  from = "/stiftung"
  to = "https://hopeontheroad.de"
  status = 301

# SPA catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
