[build]
  command = "npm run build:sitemap && npx puppeteer browsers install chrome && npm run build:prerender"
  publish = "dist"

[build.environment]
  PUPPETEER_CACHE_DIR = "/opt/buildhome/.cache/puppeteer"

[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = ["/opt/buildhome/.cache/puppeteer"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# Alte URLs aus Search Console
[[redirects]]
  from = "/entebbe"
  to = "/regionen/entebbe"
  status = 301

[[redirects]]
  from = "/kampala"
  to = "/regionen/kampala"
  status = 301

[[redirects]]
  from = "/jinja"
  to = "/regionen/jinja"
  status = 301

[[redirects]]
  from = "/murchison-nationalpark"
  to = "/murchison-falls-nationalpark"
  status = 301


[[redirects]]
  from = "/stiftung"
  to = "https://hopeontheroad.de"
  status = 301

[[redirects]]
  from = "/wanderung-zu-den-sipi-falls"
  to = "/sipi-falls"
  status = 301

[[redirects]]
  from = "/land-und-leute-uganda"
  to = "/land-und-leute"
  status = 301

# SPA catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
